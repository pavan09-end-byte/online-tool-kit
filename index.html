<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Student Toolkit – 58 Free Tools for academics, productivity, converters, and everyday utility needs." />
  <meta name="keywords" content="student toolkit, cgpa calculator, attendance calculator, study planner, free tools" />
  <meta name="author" content="Student Toolkit" />
  <title>Student Toolkit – 58 Free Tools</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="logo">🎓 Student Toolkit</div>
    <nav>
      <a href="#home">Home</a>
      <a href="#tools">Tools</a>
    </nav>
    <button id="darkToggle" class="btn ghost" aria-label="Toggle dark mode">🌙</button>
  </header>

  <main id="home">
    <section class="hero">
      <h1>Free Student Tools – Fast &amp; Simple</h1>
      <p>All tools you need in one place.</p>
    </section>

    <section class="ad-slot">Ad Space (Top Banner - AdSense Ready)</section>

    <section class="toolbar" id="tools">
      <input id="searchInput" type="search" placeholder="Search tools..." />
      <div class="filters" id="filterButtons"></div>
    </section>

    <section class="tools-grid" id="toolsGrid"></section>

    <section class="ad-slot">Ad Space (Between Tools - AdSense Ready)</section>
  </main>

  <aside id="toolPanel" class="panel hidden" aria-live="polite">
    <div class="panel-content">
      <div class="panel-head">
        <h2 id="panelTitle"></h2>
        <button id="closePanel" class="btn ghost">✕</button>
      </div>
      <div id="panelBody"></div>
    </div>
  </aside>

  <footer>
    <small>© 2026 Student Toolkit — Fully static, privacy-friendly web app.</small>
  </footer>

  <script src="script.js"></script>
</body>
</html>
